name: CI

# Runs the checks that previously only lived in the local pre-commit hook (which
# is bypassable with --no-verify) PLUS the unit-test suite, which nothing
# automated ran before — so a change that breaks fee math, the booking FSM, or
# any of the existing tests can no longer reach master unnoticed.
on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from the root package.json "packageManager" field.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (web)
        run: pnpm --filter inklee typecheck

      - name: Lint (web)
        run: pnpm --filter inklee lint

      - name: Unit tests (web)
        run: pnpm --filter inklee test

      - name: Typecheck (mobile)
        run: pnpm --filter @inklee/mobile typecheck

      - name: Lint (mobile)
        run: pnpm --filter @inklee/mobile lint

  # End-to-end tests run against a LOCAL Supabase (never production). The suite
  # hard-refuses the production project ref / hosts (tests/e2e/helpers/env.ts),
  # and no live Stripe or Resend keys are provided, so nothing external is
  # touched. See docs/testing.md.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        working-directory: apps/web
        run: supabase start

      - name: Apply migrations + local grants
        working-directory: apps/web
        run: supabase db reset

      - name: Write .env.e2e from the local stack
        working-directory: apps/web
        run: |
          set -euo pipefail
          eval "$(supabase status -o env)"
          cat > .env.e2e <<EOF
          NEXT_PUBLIC_SUPABASE_URL=$API_URL
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY
          SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY
          DATABASE_URL=$DB_URL
          NEXT_PUBLIC_APP_URL=http://localhost:3000
          EOF

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E
        working-directory: apps/web
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/test-results/
          retention-days: 7
