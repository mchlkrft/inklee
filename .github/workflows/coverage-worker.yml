name: Coverage worker heartbeat

# The Vercel Hobby plan only allows daily crons, so this schedule provides
# the 30-minute heartbeat for the country coverage orchestrator. The daily
# Vercel cron (45 3 * * *) stays as a backstop. The endpoint is a cheap
# no-op unless a coverage run is active, and every budget wall lives
# server-side; ticking more often can never exceed the daily search limits.
#
# Requires the repository Actions secret CRON_SECRET (same value as the
# Vercel env var). Without it the job skips quietly.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Tick the coverage worker
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET secret not configured; skipping."
            exit 0
          fi
          # Response body is discarded on purpose: logs of public repos are
          # public, and the tick summary is nobody's business.
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --max-time 300 \
            "https://inklee.app/api/cron/coverage-worker")
          echo "coverage-worker tick -> HTTP $code"
          [ "$code" = "200" ]
