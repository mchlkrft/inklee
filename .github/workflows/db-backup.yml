name: Nightly database backup

# Encrypted nightly pg_dump of the production Supabase database (Hobby plan
# has no automatic backups; founder decision 2026-07-20: stay Hobby, back up
# here). The dump is AES256-encrypted BEFORE upload because artifacts of a
# public repository are downloadable by any logged-in GitHub user.
#
# Restore procedure:
#   1. Download the artifact, unzip it -> backup.dump.gpg
#   2. Passphrase: Control Tower vault entry "inklee-db-backup-passphrase"
#      (mirrored as the DB_BACKUP_PASSPHRASE Actions secret).
#   3. gpg --decrypt --batch --passphrase "<passphrase>" backup.dump.gpg > backup.dump
#   4. pg_restore --clean --if-exists -d "<target DATABASE_URL>" backup.dump

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install PostgreSQL 17 client
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17 >/dev/null

      - name: Dump and encrypt
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          DB_BACKUP_PASSPHRASE: ${{ secrets.DB_BACKUP_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "$SUPABASE_DB_URL" ] || [ -z "$DB_BACKUP_PASSPHRASE" ]; then
            echo "Secrets not configured; skipping."
            exit 0
          fi
          /usr/lib/postgresql/17/bin/pg_dump "$SUPABASE_DB_URL" \
            --format=custom --compress=6 --no-owner --no-privileges \
            --file=backup.dump
          gpg --batch --yes --symmetric --cipher-algo AES256 \
            --passphrase "$DB_BACKUP_PASSPHRASE" \
            --output backup.dump.gpg backup.dump
          rm backup.dump
          ls -la backup.dump.gpg

      - name: Upload encrypted backup
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup.dump.gpg
          retention-days: 21
          if-no-files-found: error
